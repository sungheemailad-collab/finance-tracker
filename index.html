<html lang="en">
<head>

  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="Finance"/>
  <meta name="theme-color" content="#EB592A"/>
  <title>Finance Tracker</title>
  <link rel="manifest" href="./manifest.json"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/tabler-icons.min.css"/>

  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--brand:#EB592A;--bg:#fff;--bg2:#f5f5f3;--bg3:#efefed;--text:#1a1a18;--text2:#6b6b68;--text3:#9b9b98;--border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.16);--r:12px;--rsm:8px;--ok:#1D9E75;--err:#D85A30;--sb:env(safe-area-inset-bottom,0px)}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;--text:#e8e8e4;--text2:#9b9b96;--text3:#6b6b68;--border:rgba(255,255,255,.09);--border2:rgba(255,255,255,.16)}}
html,body{height:100%;background:var(--bg2);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);font-size:16px}
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;background:var(--bg)}
.hdr{padding:52px 20px 12px;background:var(--bg);border-bottom:.5px solid var(--border)}
.hdr h1{font-size:22px;font-weight:600}
.hdr .sub{font-size:13px;color:var(--text2);margin-top:2px}
.content{flex:1;overflow-y:auto;padding:16px;padding-bottom:calc(68px + var(--sb))}
.nav{position:sticky;bottom:0;background:var(--bg);border-top:.5px solid var(--border);display:flex;padding-bottom:var(--sb);z-index:100}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 2px 6px;background:none;border:none;color:var(--text3);font-size:9px;cursor:pointer;transition:color .15s}
.nav button i{font-size:20px}
.nav button.active{color:var(--brand)}
.card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.card-title{font-size:14px;font-weight:600;margin-bottom:12px}
.mg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.mg2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.m{background:var(--bg2);border-radius:var(--rsm);padding:12px}
.m .lbl{font-size:10px;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.m .val{font-size:18px;font-weight:600;line-height:1.2}
.m .msub{font-size:10px;color:var(--text2);margin-top:3px}
.ff{margin-bottom:12px}
.ff label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;font-weight:500}
.ff input,.ff select,.ff textarea{width:100%;padding:11px 13px;border:.5px solid var(--border2);border-radius:var(--rsm);background:var(--bg2);color:var(--text);font-size:16px;outline:none;-webkit-appearance:none}
.ff input:focus,.ff select:focus{border-color:var(--brand)}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.btn{width:100%;padding:13px;background:var(--brand);color:#fff;border:none;border-radius:var(--rsm);font-size:15px;font-weight:600;cursor:pointer;margin-top:4px}
.btn:active{opacity:.85}
.btn-sec{background:var(--bg3);color:var(--text)}
.er{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:.5px solid var(--border)}
.er:last-child{border-bottom:none}
.cd{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.ei{flex:1;min-width:0}
.en{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.em{font-size:11px;color:var(--text2)}
.ea{font-size:14px;font-weight:600;white-space:nowrap;text-align:right}
.orig{font-size:10px;color:var(--text3);display:block;text-align:right}
.rbtn{display:flex;gap:2px;flex-shrink:0}
.ib{background:none;border:none;color:var(--text3);font-size:15px;padding:4px 6px;cursor:pointer;border-radius:5px}
.ib:active{background:var(--bg3)}
.ib.del:active{color:var(--err)}
.br{margin-bottom:14px}
.bh{display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-bottom:5px}
.be{display:flex;align-items:center;gap:3px;color:var(--text2);font-size:13px}
.be input{width:60px;border:none;border-bottom:.5px solid var(--border2);background:transparent;color:inherit;font-size:13px;text-align:right;padding:0 0 1px;outline:none}
.bb{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.bf{height:5px;border-radius:3px;transition:width .4s ease}
.ins{display:flex;gap:10px;padding:10px 0;border-bottom:.5px solid var(--border);align-items:flex-start}
.ins:last-child{border-bottom:none}
.ii{width:34px;height:34px;border-radius:var(--rsm);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ii i{font-size:17px}
.it{font-size:13px;font-weight:600;margin-bottom:2px}
.id{font-size:12px;color:var(--text2);line-height:1.5}
.tip{padding:10px 0;border-bottom:.5px solid var(--border)}
.tip:last-child{border-bottom:none}
.tip-t{font-size:13px;font-weight:600;margin-bottom:2px}
.tip-d{font-size:12px;color:var(--text2);line-height:1.5}
.empty{text-align:center;padding:36px 20px;color:var(--text2);font-size:13px}
.empty i{font-size:36px;display:block;margin-bottom:8px;color:var(--text3)}
.cw{position:relative;width:100%;height:185px}
.leg{display:flex;flex-wrap:wrap;gap:5px 12px;margin-top:8px}
.li{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2)}
.ls{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.ok{color:var(--ok)}
.err{color:var(--err)}
.stag{font-size:10px;color:var(--text3);background:var(--bg3);border-radius:3px;padding:1px 5px;margin-left:4px;font-weight:400}
.inv-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:.5px solid var(--border)}
.inv-row:last-child{border-bottom:none}
.inv-dot{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:8px;flex-shrink:0}
.inv-label{font-size:13px}
.inv-amt{font-size:13px;font-weight:600;color:var(--ok)}
.conv-hint{font-size:12px;color:var(--text2);margin-top:-6px;margin-bottom:10px;min-height:16px}
.section-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin:12px 0 6px;padding:0 2px}
/* Overlay / modal */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200}
#modal{display:none;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg);border-radius:var(--r) var(--r) 0 0;padding:20px;z-index:201;max-height:90vh;overflow-y:auto;padding-bottom:calc(20px + var(--sb))}
.mhandle{width:40px;height:4px;background:var(--bg3);border-radius:2px;margin:0 auto 16px}
.mtitle{font-size:16px;font-weight:600;margin-bottom:16px}
/* Toast */
#toast{position:fixed;bottom:calc(76px + var(--sb));left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a18;color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;opacity:0;transition:all .25s;pointer-events:none;z-index:999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>

function toUSD(a,c){return parseFloat((a*(RATES[c]||1)).toFixed(2));}

function load(){
  try{
    // Migrate from v3 if exists
    const v3=localStorage.getItem('ft_v3');
    if(v3){
      const m={food:'eating_out',shopping:'clothes',personal_care:'facials'};
      const mig=JSON.parse(v3).map(e=>({...e,category:m[e.category]||e.category,currency:e.currency||'USD',orig:e.orig||e.amount}));
      localStorage.setItem('ft_v4',JSON.stringify(mig));
      localStorage.removeItem('ft_v3');
    }
    const e=localStorage.getItem('ft_v4');
    S.expenses=e?JSON.parse(e):SEED_EXP;if(!e)saveE();
    const inc=localStorage.getItem('ft_inc_v1');
    S.income=inc?JSON.parse(inc):SEED_INC;if(!inc)saveI();
    const b=localStorage.getItem('ft_bud_v4');
    if(b)S.budgets={...S.budgets,...JSON.parse(b)};
  }catch(x){S.expenses=SEED_EXP;S.income=SEED_INC;}
}
function saveE(){try{localStorage.setItem('ft_v4',JSON.stringify(S.expenses));}catch(x){}}
function saveI(){try{localStorage.setItem('ft_inc_v1',JSON.stringify(S.income));}catch(x){}}
function saveB(){try{localStorage.setItem('ft_bud_v4',JSON.stringify(S.budgets));}catch(x){}}

function mexp(m,y){y=y??CY;return S.expenses.filter(e=>{const d=new Date(e.date+'T12:00:00');return d.getMonth()===m&&d.getFullYear()===y;});}
function minc(m,y){y=y??CY;return S.income.filter(e=>{const d=new Date(e.date+'T12:00:00');return d.getMonth()===m&&d.getFullYear()===y;});}
function cat(id){return CATS.find(c=>c.id===id)||CATS[CATS.length-2];}
function fmt(n,s=2){return'$'+Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:s,maximumFractionDigits:s});}
function fmts(n){return n>=1000?'$'+(n/1000).toFixed(1)+'k':'$'+Math.round(n);}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

function origTag(e){return(e.currency&&e.currency!=='USD')?`<span class="orig">${SYMS[e.currency]||''}${(e.orig||e.amount)} ${e.currency}</span>`:'';}

  const f=S.form;

  S.expenses.push({id:Date.now(),name:f.name.trim(),amount:toUSD(raw,f.currency),currency:f.currency,orig:raw,category:f.category,date:f.date,note:f.note});
  S.form={name:'',amount:'',currency:'USD',category:'eating_out',date:now.toISOString().split('T')[0],note:''};

function render(){
  killCharts();

  const U={dashboard:MNS[CM]+' '+CY,log:'Log & manage',income:'Log & review',budget:'Monthly targets · USD',insights:'Patterns & advice'};
  document.getElementById('pt').textContent=T[S.tab];
  document.getElementById('ps').textContent=U[S.tab];
  const c=document.getElementById('content');
  if(S.tab==='dashboard'){c.innerHTML=buildDB();initC();}
  else if(S.tab==='log'){c.innerHTML=buildLog();}
  else if(S.tab==='income'){c.innerHTML=buildIncome();}
  else if(S.tab==='budget'){c.innerHTML=buildBudget();renderBB();}
  else{c.innerHTML=buildIns();}
}

// ── DASHBOARD ────────────────────────────────────────────────────────────────
function buildDB(){
  const ce=mexp(CM),ci=minc(CM);
  const sp=ce.filter(e=>!INV_IDS.has(e.category)&&e.category!=='savings').reduce((s,e)=>s+e.amount,0);
  const sv=ce.filter(e=>e.category==='savings').reduce((s,e)=>s+e.amount,0);
  const inv=ce.filter(e=>INV_IDS.has(e.category)).reduce((s,e)=>s+e.amount,0);
  const inc=ci.reduce((s,e)=>s+e.amount,0);
  const net=inc-sp-sv-inv;
  const bud=SPEND_CATS.filter(c=>c.id!=='savings').reduce((s,c)=>s+(S.budgets[c.id]||c.budget),0);
  const recent=[...S.expenses].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);

  const invTotals=INV_CATS.map(c=>({...c,total:S.expenses.filter(e=>e.category===c.id).reduce((s,e)=>s+e.amount,0)}));
  const totalInvAll=invTotals.reduce((s,c)=>s+c.total,0);
  const hasInv=invTotals.some(c=>c.total>0);

  return`
  <div class="mg3">
    <div class="m"><div class="lbl">Income</div><div class="val ok">${fmts(inc)}</div><div class="msub">${MNS[CM]}</div></div>
    <div class="m"><div class="lbl">Spent</div><div class="val ${sp>bud?'err':''}">${fmts(sp)}</div><div class="msub">of ${fmts(bud)}</div></div>
    <div class="m"><div class="lbl">Net</div><div class="val ${net<0?'err':'ok'}">${net>=0?'+':''}${fmts(net)}</div><div class="msub">this month</div></div>
  </div>

  <div class="card">
    <div class="card-title" style="display:flex;justify-content:space-between;align-items:center">
      <span>Portfolio · all time</span>
      <span style="font-size:14px;font-weight:700;color:var(--ok)">${fmt(totalInvAll)}</span>
    </div>
    ${hasInv?invTotals.filter(c=>c.total>0).map(c=>`
    <div class="inv-row">
      <div style="display:flex;align-items:center"><span class="inv-dot" style="background:${c.color}"></span><span class="inv-label">${c.label}</span></div>
      <span class="inv-amt">${fmt(c.total)}</span>
    </div>`).join('')
    :`<div style="font-size:13px;color:var(--text2);padding:6px 0">No investment entries yet. Log them via <strong>Expense → Investment</strong> categories.</div>`}
    ${inv>0?`<div style="margin-top:10px;padding-top:10px;border-top:.5px solid var(--border);font-size:12px;color:var(--text2)">Invested this month: <strong>${fmt(inv)}</strong></div>`:''}
  </div>

  <div class="card">
    <div class="card-title">Monthly spending — ${CY}</div>
    <div class="cw"><canvas id="barChart"></canvas></div>
  </div>
  <div class="card">
    <div class="card-title">By category —
      <select onchange="S.selM=parseInt(this.value);render()" style="border:none;background:transparent;color:var(--text2);font-size:13px;cursor:pointer">
        ${MNS.map((m,i)=>`<option value="${i}"${i===S.selM?' selected':''}>${m}</option>`).join('')}
      </select>
    </div>
    <div class="cw"><canvas id="donutChart"></canvas></div>
    <div class="leg" id="dleg"></div>
  </div>
  <div class="card">
    <div class="card-title">Recent expenses</div>
    ${recent.length?recent.map(e=>`
    <div class="er">
      <div class="cd" style="background:${cat(e.category).color}"></div>
      <div class="ei">
        <div class="en">${e.name}${e.note?`<span class="stag">${e.note}</span>`:''}</div>
        <div class="em">${cat(e.category).label} · ${dateStr(e.date)}</div>
      </div>
      <div>${e.amount?`<div class="ea">${fmt(e.amount)}</div>`:''} ${origTag(e)}</div>
    </div>`).join(''):'<div class="empty"><i class="ti ti-receipt-off"></i>No transactions yet</div>'}
  </div>`;
}

function initC(){
  const bx=document.getElementById('barChart');
  if(bx){
    const d=MNS.map((_,i)=>mexp(i).filter(e=>!INV_IDS.has(e.category)&&e.category!=='savings').reduce((s,e)=>s+e.amount,0));
    S.charts.bar=new Chart(bx,{type:'bar',data:{labels:MNS,datasets:[{data:d,backgroundColor:MNS.map((_,i)=>i===CM?'#EB592A':'rgba(235,89,42,.22)'),borderRadius:4,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fmt(c.parsed.y)}}},scales:{x:{grid:{display:false},ticks:{font:{size:10},color:'#888'},border:{display:false}},y:{grid:{color:'rgba(128,128,128,.1)'},ticks:{callback:v=>fmts(v),font:{size:10},color:'#888'},border:{display:false}}}}});
  }
  const dx=document.getElementById('donutChart');
  if(dx){
    const ex=mexp(S.selM).filter(e=>!INV_IDS.has(e.category)&&e.category!=='savings');
    const tots={};ex.forEach(e=>{tots[e.category]=(tots[e.category]||0)+e.amount;});
    const ents=Object.entries(tots).sort((a,b)=>b[1]-a[1]);
    if(!ents.length){dx.parentElement.innerHTML='<div class="empty"><i class="ti ti-chart-pie-off"></i>No expenses this month</div>';}
    else{
      S.charts.donut=new Chart(dx,{type:'doughnut',data:{labels:ents.map(([k])=>cat(k).label),datasets:[{data:ents.map(([,v])=>v),backgroundColor:ents.map(([k])=>cat(k).color),borderWidth:0,hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,cutout:'68%',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fmt(c.parsed)}}}}});
      const leg=document.getElementById('dleg');
      if(leg)leg.innerHTML=ents.map(([k,v])=>`<span class="li"><span class="ls" style="background:${cat(k).color}"></span>${cat(k).label} ${fmt(v)}</span>`).join('');
    }
  }
}

    <div class="fg3">
      <div class="ff"><label>Amount</label><input id="f-amt" type="number" value="${f.amount}" placeholder="0" min="0" step="any" oninput="S.form.amount=this.value;convHint('f-amt','f-cur','f-hint')" inputmode="decimal"/></div>
      <div class="ff"><label>Currency</label>${currSelHtml('f-cur',f.currency)}</div>
      <div class="ff"><label>Date</label><input id="f-dt" type="date" value="${f.date}" oninput="S.form.date=this.value"/></div>
    </div>
    <div class="conv-hint" id="f-hint"></div>
    <div class="ff"><label>Category</label>
      <select id="f-cat" onchange="S.form.category=this.value">
        ${catOpts(f.category)}
      </select>
    </div>
    <div class="ff"><label>Source (KB · Wise · cash…)</label><input id="f-nt" type="text" value="${f.note}" placeholder="optional" oninput="S.form.note=this.value" autocomplete="off"/></div>
    <button class="btn" onclick="addExp()"><i class="ti ti-plus" style="vertical-align:-2px"></i> Add expense</button>
  </div>
  <div class="card">
    <div class="card-title">All expenses (${all.length})</div>
    ${all.length?all.map(e=>`
    <div class="er">
      <div class="cd" style="background:${cat(e.category).color}"></div>
      <div class="ei">
        <div class="en">${e.name}${e.note?`<span class="stag">${e.note}</span>`:''}</div>
        <div class="em">${cat(e.category).label} · ${dateStr(e.date)}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div class="ea">${fmt(e.amount)}</div>
        ${origTag(e)}
      </div>
      <div class="rbtn">
        <button class="ib" onclick="editExp(${e.id})"><i class="ti ti-pencil"></i></button>
        <button class="ib del" onclick="delExp(${e.id})"><i class="ti ti-trash"></i></button>
      </div>
    </div>`).join(''):'<div class="empty"><i class="ti ti-inbox"></i>No expenses yet</div>'}
  </div>`;
}

// ── INCOME ───────────────────────────────────────────────────────────────────
function buildIncome(){
  const f=S.iForm;
  const all=[...S.income].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const totalInc=all.reduce((s,e)=>s+e.amount,0);
  const salaries=all.filter(e=>e.category==='salary').reduce((s,e)=>s+e.amount,0);
  const reimbursements=all.filter(e=>e.category==='reimburse').reduce((s,e)=>s+e.amount,0);
  return`
  <div class="mg2">
    <div class="m"><div class="lbl">Total tracked</div><div class="val ok">${fmt(totalInc,0)}</div><div class="msub">${all.length} entries</div></div>
    <div class="m"><div class="lbl">Salary (BV)</div><div class="val">${fmt(salaries,0)}</div><div class="msub">Reimbursed ${fmt(reimbursements,0)}</div></div>
  </div>
  <div class="card">
    <div class="card-title">Log income</div>
    <div class="ff"><label>Description</label><input id="i-nm" type="text" value="${f.name}" placeholder="e.g. Bean Voyage salary" oninput="S.iForm.name=this.value" autocomplete="off"/></div>
    <div class="fg3">
      <div class="ff"><label>Amount</label><input id="i-amt" type="number" value="${f.amount}" placeholder="0" min="0" step="any" oninput="S.iForm.amount=this.value;convHint('i-amt','i-cur','i-hint')" inputmode="decimal"/></div>
      <div class="ff"><label>Currency</label>${currSelHtml('i-cur',f.currency)}</div>
      <div class="ff"><label>Date</label><input id="i-dt" type="date" value="${f.date}" oninput="S.iForm.date=this.value"/></div>
    </div>
    <div class="conv-hint" id="i-hint"></div>
    <div class="ff"><label>Category</label>
      <select id="i-cat" onchange="S.iForm.category=this.value">
        ${incCatOpts(f.category)}
      </select>
    </div>
    <div class="ff"><label>Note</label><input id="i-nt" type="text" value="${f.note}" placeholder="optional" oninput="S.iForm.note=this.value" autocomplete="off"/></div>
    <button class="btn" onclick="addInc()"><i class="ti ti-plus" style="vertical-align:-2px"></i> Log income</button>
  </div>
  <div class="card">
    <div class="card-title">Income history (${all.length})</div>
    ${all.length?all.map(e=>{
      const ic=INC_CATS.find(c=>c.id===e.category);
      return`
    <div class="er">
      <div class="cd" style="background:var(--ok)"></div>
      <div class="ei">
        <div class="en">${e.name}${e.note?`<span class="stag">${e.note}</span>`:''}</div>
        <div class="em">${ic?.label||e.category} · ${dateStr(e.date)}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div class="ea ok">${fmt(e.amount)}</div>
        ${origTag(e)}
      </div>
      <div class="rbtn">
        <button class="ib" onclick="editInc(${e.id})"><i class="ti ti-pencil"></i></button>
        <button class="ib del" onclick="delInc(${e.id})"><i class="ti ti-trash"></i></button>
      </div>
    </div>`}).join(''):'<div class="empty"><i class="ti ti-cash-off"></i>No income logged yet</div>'}
  </div>`;
}

// ── BUDGET ───────────────────────────────────────────────────────────────────
function buildBudget(){
  return`
  <div class="card" style="background:rgba(235,89,42,.06);border-color:rgba(235,89,42,.2)">
    <div style="font-size:13px;color:var(--text2);line-height:1.65">
      <strong style="color:var(--brand)">Set from your statements</strong> ·
      BV salary <strong style="color:var(--brand)">$3,450/mo</strong> ·
      Total target <strong style="color:var(--brand)">$2,760/mo</strong> · Edit inline. Investments track separately.
    </div>
  </div>
  <div class="card"><div class="card-title">Targets — ${MNS[CM]}</div><div id="bbs"></div></div>`;
}
function renderBB(){
  const el=document.getElementById('bbs');if(!el)return;
  const cur=mexp(CM);
  el.innerHTML=SPEND_CATS.map(c=>{
    const sp=cur.filter(e=>e.category===c.id).reduce((s,e)=>s+e.amount,0);
    const bud=S.budgets[c.id]||c.budget;
    const pct=Math.min(100,bud>0?(sp/bud)*100:0);
    const ov=bud>0&&sp>bud;
    return`
    <div class="br">
      <div class="bh">
        <span style="display:flex;align-items:center;gap:5px"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${c.color}"></span><span style="font-size:13px;font-weight:500">${c.label}</span></span>
        <div class="be" style="color:${ov?'var(--err)':'var(--text2)'}">
          <span>${fmt(sp,0)} / $</span>
          <input type="number" value="${bud}" onchange="updB('${c.id}',this.value)">
        </div>
      </div>
      ${bud>0?`<div class="bb"><div class="bf" style="width:${pct}%;background:${ov?'var(--err)':c.color}"></div></div>`:''}
    </div>`;
  }).join('');
}

// ── INSIGHTS ─────────────────────────────────────────────────────────────────
function buildIns(){
  const allT=S.expenses.filter(e=>e.category==='travel').reduce((s,e)=>s+e.amount,0);
  const allF=S.expenses.filter(e=>e.category==='eating_out').reduce((s,e)=>s+e.amount,0);
  const allFac=S.expenses.filter(e=>e.category==='facials').reduce((s,e)=>s+e.amount,0);
  const allInv=S.expenses.filter(e=>INV_IDS.has(e.category)).reduce((s,e)=>s+e.amount,0);
  const totalInc=S.income.reduce((s,e)=>s+e.amount,0);
  const totalExp=S.expenses.filter(e=>!INV_IDS.has(e.category)).reduce((s,e)=>s+e.amount,0);
  const byM=MNS.map((_,i)=>mexp(i).filter(e=>!INV_IDS.has(e.category)&&e.category!=='savings').reduce((s,e)=>s+e.amount,0));
  const nz=byM.filter(v=>v>0);
  const avg=nz.length?nz.reduce((a,b)=>a+b,0)/nz.length:0;

  const ins=[
    {bg:'#E8F4F1',ic:'ti-plane',icol:'#0F6E56',
      t:'Travel is your biggest variable cost',
      d:`$${Math.round(allT).toLocaleString()} tracked in travel. You fly nearly every month. Flag reimbursable trips — some BV expenses already showed up as income. Treating those as "net zero" gives you the clearest picture.`},
    {bg:'#FEF0EC',ic:'ti-tools-kitchen-2',icol:'#8B2D0F',
      t:'Eating out: biggest daily habit',
      d:`$${Math.round(allF).toLocaleString()} in restaurants. Casa Bruna, Rosetta, Quentin Cafe appear every month. Even trimming $60/mo here frees $720/year.`},
    {bg:'#FCF0F4',ic:'ti-sparkles',icol:'#72243E',
      t:'Facials & beauty spikes unpredictably',
      d:`$${Math.round(allFac).toLocaleString()} total — big months (Kento $635, LUSH Spa $162) don't fit a monthly budget. Try a quarterly cap of $350 instead.`},
    allInv>0
      ?{bg:'#E9F7EF',ic:'ti-trending-up',icol:'#0A5C36',
        t:`${fmt(allInv)} invested`,
        d:'Logged across your investment categories. Each entry shows up in the portfolio section on Home. Keep logging consistently — the all-time total compounds in meaning as the portfolio grows.'}
      :{bg:'#EEF0FC',ic:'ti-piggy-bank',icol:'#3C3489',
        t:'Start logging investments',
        d:'Use Expense → Investment categories (ISA, IRP, S&P 500, Stocks). They appear in the Portfolio card on your Home tab, separate from regular spending.'},
    {bg:'#E9F7EF',ic:'ti-heart-rate-monitor',icol:'#0A5C36',
      t:'SafetyWing: your most consistent fixed cost',
      d:'~$67/month across every statement. Good baseline. For longer stretches in Mexico, IMSS voluntary (~$500/yr) adds local clinic access at very low cost alongside SafetyWing.'},
  ];

  const tips=[
    {t:'USD as base currency — the right call',d:'You earn in USD (Bean Voyage), your Wise card runs in USD, and your KB card just happens to bill in KRW. All amounts stored in USD here; the original currency is shown alongside for your reference.'},
    {t:'IRP (연금저축) & ISA — Korean tax advantages',d:'If you have any Korean income or tax residency, IRP allows up to ₩9M annual deduction. ISA compounds tax-free. Max these before taxable accounts.'},
    {t:'S&P 500 ETF for everything else',d:'VOO or FXAIX (US brokerage) or KODEX 미국 S&P500 TR (KRX). Cost-average monthly. The amount matters less than the consistency.'},
    {t:'BV reimbursements ≠ savings',d:'Log them as "BV Reimbursement" income, not income. This keeps your savings rate honest — otherwise it overstates how much of your own money you\'re keeping.'},
  ];

  return`
  <div class="mg2">
    <div class="m"><div class="lbl">Avg monthly spend</div><div class="val">${fmt(avg)}</div><div class="msub">tracked months</div></div>
    <div class="m"><div class="lbl">Income tracked</div><div class="val ok">${fmts(totalInc)}</div><div class="msub">${S.income.length} entries</div></div>
  </div>
  <div class="card">
    <div class="card-title">From your data</div>
    ${ins.map(i=>`
    <div class="ins">
      <div class="ii" style="background:${i.bg}"><i class="ti ${i.ic}" style="color:${i.icol}"></i></div>
      <div><div class="it">${i.t}</div><div class="id">${i.d}</div></div>
    </div>`).join('')}
  </div>
  <div class="card">
    <div class="card-title">Investment guidance</div>
    ${tips.map(t=>`<div class="tip"><div class="tip-t">${t.t}</div><div class="tip-d">${t.d}</div></div>`).join('')}
  </div>`;
}

if('serviceWorker' in navigator){navigator.serviceWorker.register('./service-worker.js').catch(()=>{});}
load();render();
