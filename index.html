<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Finance"/>
  <meta name="theme-color" content="#EB592A"/>
  <title>Finance Tracker</title>
  <link rel="manifest" href="./manifest.json"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/tabler-icons.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand: #EB592A;
      --bg: #ffffff;
      --bg2: #f5f5f3;
      --bg3: #efefed;
      --text: #1a1a18;
      --text2: #6b6b68;
      --text3: #9b9b98;
      --border: rgba(0,0,0,0.10);
      --border2: rgba(0,0,0,0.18);
      --radius: 12px;
      --radius-sm: 8px;
      --success: #1D9E75;
      --danger: #D85A30;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a;
        --bg2: #252523;
        --bg3: #2e2e2b;
        --text: #e8e8e4;
        --text2: #9b9b96;
        --text3: #6b6b68;
        --border: rgba(255,255,255,0.10);
        --border2: rgba(255,255,255,0.18);
      }
    }

    html, body { height: 100%; background: var(--bg2); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: var(--text); font-size: 16px; }

    #app { display: flex; flex-direction: column; height: 100%; max-width: 480px; margin: 0 auto; background: var(--bg); }

    /* Header */
    .header { padding: 52px 20px 12px; background: var(--bg); border-bottom: 0.5px solid var(--border); }
    .header h1 { font-size: 22px; font-weight: 600; }
    .header .subtitle { font-size: 13px; color: var(--text2); margin-top: 2px; }

    /* Content */
    .content { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: calc(72px + var(--safe-bottom)); }

    /* Bottom Nav */
    .nav { position: sticky; bottom: 0; background: var(--bg); border-top: 0.5px solid var(--border); display: flex; padding-bottom: var(--safe-bottom); z-index: 100; }
    .nav button { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 4px 8px; background: none; border: none; color: var(--text3); font-size: 10px; cursor: pointer; transition: color 0.15s; }
    .nav button i { font-size: 22px; }
    .nav button.active { color: var(--brand); }

    /* Cards */
    .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
    .card-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--text); }

    /* Metric grid */
    .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .metric { background: var(--bg2); border-radius: var(--radius-sm); padding: 14px; }
    .metric .label { font-size: 11px; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
    .metric .value { font-size: 20px; font-weight: 600; }
    .metric .sub { font-size: 11px; color: var(--text2); margin-top: 3px; }

    /* Form */
    .form-field { margin-bottom: 14px; }
    .form-field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; font-weight: 500; }
    .form-field input, .form-field select, .form-field textarea {
      width: 100%; padding: 12px 14px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm);
      background: var(--bg2); color: var(--text); font-size: 16px; outline: none; -webkit-appearance: none; appearance: none;
    }
    .form-field input:focus, .form-field select:focus { border-color: var(--brand); }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn { width: 100%; padding: 14px; background: var(--brand); color: white; border: none; border-radius: var(--radius-sm); font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 4px; }
    .btn:active { opacity: 0.85; transform: scale(0.99); }

    /* Expense rows */
    .expense-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
    .expense-row:last-child { border-bottom: none; }
    .cat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .expense-info { flex: 1; min-width: 0; }
    .expense-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .expense-meta { font-size: 12px; color: var(--text2); }
    .expense-amount { font-size: 14px; font-weight: 600; white-space: nowrap; }
    .del-btn { background: none; border: none; color: var(--text3); font-size: 18px; padding: 4px 8px; cursor: pointer; border-radius: 6px; }
    .del-btn:active { background: rgba(216,90,48,0.1); color: var(--danger); }

    /* Budget bars */
    .budget-row { margin-bottom: 16px; }
    .budget-header { display: flex; justify-content: space-between; align-items: center; font-size: 13px; margin-bottom: 6px; }
    .budget-amount { display: flex; align-items: center; gap: 4px; }
    .budget-amount input { width: 70px; border: none; border-bottom: 0.5px solid var(--border2); background: transparent; color: var(--text2); font-size: 13px; text-align: right; padding: 0 0 1px; outline: none; }
    .bar-bg { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 6px; border-radius: 3px; transition: width 0.4s ease; }

    /* Insights */
    .insight { display: flex; gap: 12px; padding: 12px 0; border-bottom: 0.5px solid var(--border); align-items: flex-start; }
    .insight:last-child { border-bottom: none; }
    .insight-icon { width: 36px; height: 36px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .insight-icon i { font-size: 18px; }
    .insight-title { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
    .insight-desc { font-size: 12px; color: var(--text2); line-height: 1.5; }

    /* Invest tips */
    .tip { padding: 12px 0; border-bottom: 0.5px solid var(--border); }
    .tip:last-child { border-bottom: none; }
    .tip-title { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
    .tip-desc { font-size: 12px; color: var(--text2); line-height: 1.5; }

    /* Empty state */
    .empty { text-align: center; padding: 40px 20px; color: var(--text2); font-size: 14px; }
    .empty i { font-size: 40px; display: block; margin-bottom: 10px; color: var(--text3); }

    /* Month pill row */
    .month-row { display: flex; gap: 6px; overflow-x: auto; margin-bottom: 14px; padding-bottom: 4px; scrollbar-width: none; }
    .month-row::-webkit-scrollbar { display: none; }
    .month-pill { flex-shrink: 0; padding: 5px 14px; border: 0.5px solid var(--border2); border-radius: 20px; font-size: 12px; background: none; color: var(--text2); cursor: pointer; }
    .month-pill.active { background: var(--brand); color: white; border-color: var(--brand); }

    /* Chart wrapper */
    .chart-wrap { position: relative; width: 100%; height: 200px; }
    .legend { display: flex; flex-wrap: wrap; gap: 6px 14px; margin-top: 10px; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text2); }
    .legend-sq { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }

    /* Success / danger text */
    .text-success { color: var(--success); }
    .text-danger { color: var(--danger); }

    /* Import CSV */
    .import-area { border: 1.5px dashed var(--border2); border-radius: var(--radius-sm); padding: 20px; text-align: center; color: var(--text2); font-size: 13px; cursor: pointer; }
    .import-area i { font-size: 28px; display: block; margin-bottom: 8px; }

    /* Toast */
    #toast { position: fixed; bottom: calc(80px + var(--safe-bottom)); left: 50%; transform: translateX(-50%) translateY(20px); background: #1a1a18; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: all 0.25s; pointer-events: none; z-index: 999; white-space: nowrap; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1 id="page-title">Dashboard</h1>
    <div class="subtitle" id="page-sub">May 2025</div>
  </div>
  <div class="content" id="content"></div>
  <nav class="nav" role="tablist">
    <button onclick="setTab('dashboard')" id="tab-dashboard" class="active" aria-label="Dashboard">
      <i class="ti ti-layout-dashboard"></i>Dashboard
    </button>
    <button onclick="setTab('log')" id="tab-log" aria-label="Log expense">
      <i class="ti ti-plus-circle"></i>Log
    </button>
    <button onclick="setTab('budget')" id="tab-budget" aria-label="Budgets">
      <i class="ti ti-target"></i>Budget
    </button>
    <button onclick="setTab('insights')" id="tab-insights" aria-label="Insights">
      <i class="ti ti-bulb"></i>Insights
    </button>
  </nav>
</div>
<div id="toast"></div>

<script>
// ── Data ──────────────────────────────────────────────────────────────────────
const CATS = [
  { id:'food',          label:'Food & dining',   color:'#EB592A', budget:400 },
  { id:'transport',     label:'Transport',        color:'#378ADD', budget:150 },
  { id:'housing',       label:'Housing',          color:'#534AB7', budget:1200 },
  { id:'health',        label:'Health',           color:'#1D9E75', budget:100 },
  { id:'entertainment', label:'Entertainment',    color:'#D4537E', budget:100 },
  { id:'shopping',      label:'Shopping',         color:'#EF9F27', budget:200 },
  { id:'savings',       label:'Savings',          color:'#639922', budget:300 },
  { id:'other',         label:'Other',            color:'#888780', budget:150 },
];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const now = new Date();
const CUR_M = now.getMonth();
const CUR_Y = now.getFullYear();

let state = {
  tab: 'dashboard',
  expenses: [],
  budgets: Object.fromEntries(CATS.map(c=>[c.id, c.budget])),
  selectedMonth: CUR_M,
  form: { name:'', amount:'', category:'food', date: now.toISOString().split('T')[0], note:'' },
  chartInstances: {}
};

function load() {
  try {
    const e = localStorage.getItem('ft_expenses');
    if (e) state.expenses = JSON.parse(e);
    const b = localStorage.getItem('ft_budgets');
    if (b) state.budgets = {...state.budgets, ...JSON.parse(b)};
  } catch(e) {}
}

function save() {
  try {
    localStorage.setItem('ft_expenses', JSON.stringify(state.expenses));
  } catch(e) {}
}

function saveBudgets() {
  try {
    localStorage.setItem('ft_budgets', JSON.stringify(state.budgets));
  } catch(e) {}
}

function monthExp(m, y) {
  y = y ?? CUR_Y;
  return state.expenses.filter(e => {
    const d = new Date(e.date+'T12:00:00');
    return d.getMonth()===m && d.getFullYear()===y;
  });
}

function cat(id) { return CATS.find(c=>c.id===id) || CATS[CATS.length-1]; }
function fmt(n) { return '$'+Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

// ── Actions ───────────────────────────────────────────────────────────────────
function addExpense() {
  const f = state.form;
  if (!f.name.trim()) { toast('Add a description'); return; }
  if (!f.amount || isNaN(parseFloat(f.amount)) || parseFloat(f.amount)<=0) { toast('Enter a valid amount'); return; }
  state.expenses.push({
    id: Date.now(),
    name: f.name.trim(),
    amount: parseFloat(parseFloat(f.amount).toFixed(2)),
    category: f.category,
    date: f.date,
    note: f.note
  });
  state.form = { name:'', amount:'', category:'food', date: now.toISOString().split('T')[0], note:'' };
  save();
  toast('Expense added!');
  render();
}

function deleteExpense(id) {
  if (!confirm('Delete this expense?')) return;
  state.expenses = state.expenses.filter(e=>e.id!==id);
  save();
  render();
}

function updateBudget(catId, val) {
  state.budgets[catId] = parseFloat(val)||0;
  saveBudgets();
  renderBudgetBars();
}

// ── Tab routing ────────────────────────────────────────────────────────────────
function setTab(tab) {
  state.tab = tab;
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  render();
}

// ── Render ────────────────────────────────────────────────────────────────────
function destroyCharts() {
  Object.values(state.chartInstances).forEach(c=>{ try{c.destroy()}catch(e){} });
  state.chartInstances = {};
}

function render() {
  destroyCharts();
  const titles = { dashboard:'Dashboard', log:'Log expense', budget:'Budget', insights:'Insights' };
  const subs = { dashboard: MONTHS[CUR_M]+' '+CUR_Y, log:'Track your spending', budget:'Monthly targets', insights:'Personalized tips' };
  document.getElementById('page-title').textContent = titles[state.tab];
  document.getElementById('page-sub').textContent = subs[state.tab];

  const content = document.getElementById('content');
  if (state.tab==='dashboard') { content.innerHTML = buildDashboard(); initDashboardCharts(); }
  else if (state.tab==='log')  { content.innerHTML = buildLog(); }
  else if (state.tab==='budget') { content.innerHTML = buildBudget(); renderBudgetBars(); }
  else if (state.tab==='insights') { content.innerHTML = buildInsights(); }
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
function buildDashboard() {
  const cur = monthExp(CUR_M);
  const spending = cur.filter(e=>e.category!=='savings').reduce((s,e)=>s+e.amount,0);
  const savings  = cur.filter(e=>e.category==='savings').reduce((s,e)=>s+e.amount,0);
  const budget   = CATS.filter(c=>c.id!=='savings').reduce((s,c)=>s+(state.budgets[c.id]||c.budget),0);
  const rem = budget - spending;
  const savRate = (spending+savings)>0 ? ((savings/(spending+savings))*100).toFixed(0) : 0;
  const recent = [...state.expenses].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,6);

  return `
    <div class="metric-grid">
      <div class="metric">
        <div class="label">Spent this month</div>
        <div class="value ${spending>budget?'text-danger':''}">${fmt(spending)}</div>
        <div class="sub">of ${fmt(budget)} budget</div>
      </div>
      <div class="metric">
        <div class="label">Saved</div>
        <div class="value text-success">${fmt(savings)}</div>
        <div class="sub">${savRate}% savings rate</div>
      </div>
      <div class="metric">
        <div class="label">Remaining</div>
        <div class="value ${rem<0?'text-danger':'text-success'}">${fmt(rem)}</div>
        <div class="sub">${rem<0?'over budget':'left this month'}</div>
      </div>
      <div class="metric">
        <div class="label">Transactions</div>
        <div class="value">${cur.length}</div>
        <div class="sub">this month</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Monthly spending — ${CUR_Y}</div>
      <div class="chart-wrap"><canvas id="barChart" role="img" aria-label="Monthly spending bar chart"></canvas></div>
    </div>

    <div class="card">
      <div class="card-title">
        By category — 
        <select onchange="state.selectedMonth=parseInt(this.value);render()" style="border:none;background:transparent;color:var(--text2);font-size:13px;cursor:pointer">
          ${MONTHS.map((m,i)=>`<option value="${i}" ${i===state.selectedMonth?'selected':''}>${m}</option>`).join('')}
        </select>
      </div>
      <div class="chart-wrap"><canvas id="donutChart" role="img" aria-label="Spending by category donut chart"></canvas></div>
      <div class="legend" id="donut-legend"></div>
    </div>

    <div class="card">
      <div class="card-title">Recent transactions</div>
      ${recent.length ? recent.map(e=>`
        <div class="expense-row">
          <div class="cat-dot" style="background:${cat(e.category).color}"></div>
          <div class="expense-info">
            <div class="expense-name">${e.name}</div>
            <div class="expense-meta">${cat(e.category).label} · ${new Date(e.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
          </div>
          <div class="expense-amount">${fmt(e.amount)}</div>
        </div>
      `).join('') : '<div class="empty"><i class="ti ti-receipt-off"></i>No transactions yet</div>'}
    </div>
  `;
}

function initDashboardCharts() {
  // Bar chart
  const barCtx = document.getElementById('barChart');
  if (barCtx) {
    const data = MONTHS.map((_,i)=>monthExp(i).filter(e=>e.category!=='savings').reduce((s,e)=>s+e.amount,0));
    state.chartInstances.bar = new Chart(barCtx, {
      type:'bar',
      data:{ labels:MONTHS, datasets:[{ data, backgroundColor: MONTHS.map((_,i)=>i===CUR_M?'#EB592A':'rgba(235,89,42,0.22)'), borderRadius:4, borderSkipped:false }] },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label:c=>fmt(c.parsed.y) } } },
        scales:{
          x:{ grid:{display:false}, ticks:{font:{size:10},color:'#888'}, border:{display:false} },
          y:{ grid:{color:'rgba(128,128,128,0.1)'}, ticks:{callback:v=>'$'+Math.round(v),font:{size:10},color:'#888'}, border:{display:false} }
        }
      }
    });
  }

  // Donut chart
  const donutCtx = document.getElementById('donutChart');
  if (donutCtx) {
    const exps = monthExp(state.selectedMonth).filter(e=>e.category!=='savings');
    const totals = {};
    exps.forEach(e=>{ totals[e.category]=(totals[e.category]||0)+e.amount; });
    const entries = Object.entries(totals).sort((a,b)=>b[1]-a[1]);
    if (!entries.length) {
      donutCtx.parentElement.innerHTML = '<div class="empty"><i class="ti ti-chart-pie-off"></i>No expenses this month</div>';
    } else {
      state.chartInstances.donut = new Chart(donutCtx, {
        type:'doughnut',
        data:{
          labels: entries.map(([k])=>cat(k).label),
          datasets:[{ data:entries.map(([,v])=>v), backgroundColor:entries.map(([k])=>cat(k).color), borderWidth:0, hoverOffset:4 }]
        },
        options:{
          responsive:true, maintainAspectRatio:false, cutout:'68%',
          plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label:c=>fmt(c.parsed) } } }
        }
      });
      const legend = document.getElementById('donut-legend');
      if (legend) legend.innerHTML = entries.map(([k,v])=>`<span class="legend-item"><span class="legend-sq" style="background:${cat(k).color}"></span>${cat(k).label} ${fmt(v)}</span>`).join('');
    }
  }
}

// ── Log ───────────────────────────────────────────────────────────────────────
function buildLog() {
  const f = state.form;
  const all = [...state.expenses].sort((a,b)=>new Date(b.date)-new Date(a.date));

  return `
    <div class="card">
      <div class="card-title">Add expense</div>
      <div class="form-field">
        <label>Description</label>
        <input type="text" value="${f.name}" placeholder="e.g. Coffee, Uber, Groceries" oninput="state.form.name=this.value" autocomplete="off"/>
      </div>
      <div class="form-grid">
        <div class="form-field">
          <label>Amount ($)</label>
          <input type="number" value="${f.amount}" placeholder="0.00" min="0" step="0.01" oninput="state.form.amount=this.value" inputmode="decimal"/>
        </div>
        <div class="form-field">
          <label>Date</label>
          <input type="date" value="${f.date}" oninput="state.form.date=this.value"/>
        </div>
      </div>
      <div class="form-field">
        <label>Category</label>
        <select onchange="state.form.category=this.value">
          ${CATS.map(c=>`<option value="${c.id}" ${c.id===f.category?'selected':''}>${c.label}</option>`).join('')}
        </select>
      </div>
      <div class="form-field">
        <label>Note (optional)</label>
        <input type="text" value="${f.note}" placeholder="Any details..." oninput="state.form.note=this.value" autocomplete="off"/>
      </div>
      <button class="btn" onclick="addExpense()">
        <i class="ti ti-plus" style="vertical-align:-2px"></i> Add expense
      </button>
    </div>

    <div class="card">
      <div class="card-title">All transactions (${all.length})</div>
      ${all.length ? all.map(e=>`
        <div class="expense-row">
          <div class="cat-dot" style="background:${cat(e.category).color}"></div>
          <div class="expense-info">
            <div class="expense-name">${e.name}</div>
            <div class="expense-meta">${cat(e.category).label} · ${new Date(e.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div>
          </div>
          <div style="display:flex;align-items:center;gap:6px">
            <div class="expense-amount">${fmt(e.amount)}</div>
            <button class="del-btn" onclick="deleteExpense(${e.id})" aria-label="Delete"><i class="ti ti-trash" style="font-size:16px"></i></button>
          </div>
        </div>
      `).join('') : '<div class="empty"><i class="ti ti-inbox"></i>No transactions yet</div>'}
    </div>
  `;
}

// ── Budget ────────────────────────────────────────────────────────────────────
function buildBudget() {
  return `
    <div class="card" style="background:rgba(235,89,42,0.06);border-color:rgba(235,89,42,0.2)">
      <div style="font-size:13px;color:var(--text2);line-height:1.6">
        <strong style="color:var(--brand)">50/30/20 rule:</strong> 50% needs (housing, food, transport), 30% wants (entertainment, shopping), 20% savings.
      </div>
    </div>
    <div class="card">
      <div class="card-title">Monthly budget targets</div>
      <div id="budget-bars"></div>
    </div>
  `;
}

function renderBudgetBars() {
  const el = document.getElementById('budget-bars');
  if (!el) return;
  const cur = monthExp(CUR_M);
  el.innerHTML = CATS.filter(c=>c.id!=='savings').map(c=>{
    const spent = cur.filter(e=>e.category===c.id).reduce((s,e)=>s+e.amount,0);
    const budget = state.budgets[c.id]||c.budget;
    const pct = Math.min(100,(spent/budget)*100);
    const over = spent>budget;
    return `
      <div class="budget-row">
        <div class="budget-header">
          <span style="font-size:13px;font-weight:500">${c.label}</span>
          <div class="budget-amount">
            <span style="font-size:13px;color:${over?'var(--danger)':'var(--text2)'}">${fmt(spent)} /</span>
            <span>$</span><input type="number" value="${budget}" onchange="updateBudget('${c.id}',this.value)" style="color:${over?'var(--danger)':'var(--text2)'}">
          </div>
        </div>
        <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${over?'var(--danger)':c.color}"></div></div>
      </div>
    `;
  }).join('');
}

// ── Insights ──────────────────────────────────────────────────────────────────
function buildInsights() {
  const cur = monthExp(CUR_M).filter(e=>e.category!=='savings');
  const total = cur.reduce((s,e)=>s+e.amount,0);
  const savings = monthExp(CUR_M).filter(e=>e.category==='savings').reduce((s,e)=>s+e.amount,0);
  const allTimeSave = state.expenses.filter(e=>e.category==='savings').reduce((s,e)=>s+e.amount,0);
  const savRate = (total+savings)>0 ? (savings/(total+savings)*100).toFixed(0) : 0;

  const insights = [];

  if (savRate < 20) {
    insights.push({ bg:'#FFF8E7', icon:'ti-piggy-bank', iconColor:'#9A6200', title:'Boost your savings rate', desc:`You're saving ${savRate}% this month. The goal is 20%+. Try automating a transfer on payday before you can spend it.` });
  } else {
    insights.push({ bg:'#E9F7EF', icon:'ti-trophy', iconColor:'#0A5C36', title:'Solid savings rate!', desc:`${savRate}% saved this month — great work. Consider putting excess into a low-cost index fund for long-term growth.` });
  }

  const foodSpent = cur.filter(e=>e.category==='food').reduce((s,e)=>s+e.amount,0);
  const foodBudget = state.budgets.food || 400;
  if (foodSpent > foodBudget) {
    insights.push({ bg:'#FEF0EC', icon:'ti-fork', iconColor:'#8B2D0F', title:'Food spend is over budget', desc:`${fmt(foodSpent)} vs ${fmt(foodBudget)} budget. Meal prepping 2–3 times a week can make a real dent.` });
  }

  if (total > 0) {
    const topCat = CATS.filter(c=>c.id!=='savings').sort((a,b)=>{
      return cur.filter(e=>e.category===b.id).reduce((s,e)=>s+e.amount,0) - cur.filter(e=>e.category===a.id).reduce((s,e)=>s+e.amount,0);
    })[0];
    const topAmt = cur.filter(e=>e.category===topCat.id).reduce((s,e)=>s+e.amount,0);
    insights.push({ bg:'#EEF0FC', icon:'ti-chart-pie', iconColor:'#3C3489', title:`Top spend: ${topCat.label}`, desc:`${fmt(topAmt)} (${((topAmt/total)*100).toFixed(0)}% of spending). Check if this aligns with your priorities.` });
  }

  if (allTimeSave < 500) {
    insights.push({ bg:'#EEF0FC', icon:'ti-coin', iconColor:'#3C3489', title:'Start an emergency fund', desc:`Aim for $500 first, then build to 3–6 months of expenses (roughly ${fmt(total*4)}). Keep it in a high-yield savings account.` });
  } else {
    insights.push({ bg:'#E9F7EF', icon:'ti-trending-up', iconColor:'#0A5C36', title:'Put savings to work', desc:`${fmt(allTimeSave)} saved total. After your emergency fund, low-cost index funds (S&P 500 ETFs) are a strong next step.` });
  }

  const investTips = [
    { title:'Emergency fund first', desc:'3–6 months of expenses in a high-yield savings account before anything else.' },
    { title:'Low-cost index funds', desc:'VOO, FXAIX, or similar S&P 500 ETFs. Broad diversification, minimal fees.' },
    { title:'Tax-advantaged accounts', desc:'401(k) match first (free money), then IRA ($7,000/yr limit), then taxable brokerage.' },
    { title:'Automate everything', desc:'Set up auto-transfers on payday. Spend what\'s left, not what you intend to save.' },
  ];

  return `
    <div class="metric-grid">
      <div class="metric">
        <div class="label">All-time spending</div>
        <div class="value">${fmt(state.expenses.filter(e=>e.category!=='savings').reduce((s,e)=>s+e.amount,0))}</div>
        <div class="sub">tracked total</div>
      </div>
      <div class="metric">
        <div class="label">All-time savings</div>
        <div class="value text-success">${fmt(allTimeSave)}</div>
        <div class="sub">saved total</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Personalized insights</div>
      ${insights.map(i=>`
        <div class="insight">
          <div class="insight-icon" style="background:${i.bg}"><i class="ti ${i.icon}" style="color:${i.iconColor}"></i></div>
          <div>
            <div class="insight-title">${i.title}</div>
            <div class="insight-desc">${i.desc}</div>
          </div>
        </div>
      `).join('')}
    </div>

    <div class="card">
      <div class="card-title"><i class="ti ti-trending-up" style="vertical-align:-2px;margin-right:4px"></i> Investment quick-start</div>
      ${investTips.map(t=>`
        <div class="tip">
          <div class="tip-title">${t.title}</div>
          <div class="tip-desc">${t.desc}</div>
        </div>
      `).join('')}
    </div>
  `;
}

// ── Init ──────────────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js').catch(()=>{});
}

load();
render();
</script>
</body>
</html>
